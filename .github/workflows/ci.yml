name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Verify static and legal guards
        run: npm run verify

      - name: Run unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build

      - name: Smoke-test MCP stdio server
        run: npm run smoke:mcp
