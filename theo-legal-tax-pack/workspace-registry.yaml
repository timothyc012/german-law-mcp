# Theo Legal/Tax Pack workspace registry.
# Replace all __PLACEHOLDER__ values with local absolute paths during install.

pack:
  name: theo-legal-tax-pack
  version: 0.1.0
  owner: Theo Legal

orchestrator:
  theo_legal:
    kind: skill
    path: "__THEO_LEGAL__"
    aliases:
      - theo
      - theo-legal
      - 테오
      - 태오

mcp_servers:
  german_law:
    kind: node-mcp
    command: node
    args:
      - "__GERMAN_LAW_MCP__/dist/index.js"
    source_path: "__GERMAN_LAW_MCP__"
    role: German law authority engine

  steuer:
    kind: python-mcp
    command: uv
    args:
      - "--directory"
      - "__STEUER_MCP__"
      - "run"
      - "steuer-mcp"
    source_path: "__STEUER_MCP__"
    role: German tax and calculation engine

workspaces:
  legal_research:
    kind: workflow-workspace
    path: "__LEGAL_RESEARCH__"
    role: General international, EU, and Korean legal research
    use_when:
      - multi-jurisdiction research
      - Korean law research
      - broad legal source collection
      - full research memo workflows

  gdpr_expert:
    kind: workflow-workspace
    path: "__GDPR_EXPERT__"
    role: EU data protection and GDPR specialist
    use_when:
      - GDPR
      - ePrivacy
      - EDPB
      - CJEU privacy
      - data governance

  contract_review:
    kind: workflow-workspace
    path: "__CONTRACT_REVIEW__"
    role: Contract document review and drafting specialist
    use_when:
      - DOCX review
      - redlines
      - contract comments
      - negotiation memo
      - drafting and rereview

sharing_policy:
  include:
    - registry templates
    - routing docs
    - install scripts
    - skill shims
  exclude:
    - .env
    - user-config.json
    - library/
    - knowledge/
    - output/
    - private client documents
    - generated legal opinions
    - local absolute paths

